# Backup cron — fires every 5 minutes from GitHub's infrastructure.
# Primary cron is cron-job.org (every 1 min). Configure:
#   URL:    https://testedefi.vercel.app/api/check-alerts
#   Header: x-cron-secret: <CRON_SECRET from Vercel env, if set>
#   Schedule: every 1 minute
name: Alert Check (backup)

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger alert check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 90 \
            "https://testedefi.vercel.app/api/check-alerts")
          echo "Response status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: check-alerts returned $STATUS"
          fi
