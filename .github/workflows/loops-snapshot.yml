# Backup cron — fires every 2 hours from GitHub's infrastructure.
# Primary cron is cron-job.org (every 2h at :05 UTC). Configure:
#   URL:    https://testedefi.vercel.app/api/loop-cron-snapshot
#   Header: x-sync-secret: <SYNC_SECRET from Vercel env>
#   Schedule: 5 */2 * * * (or "every 2 hours" in cron-job.org UI)
name: Loops Snapshot (backup)

on:
  schedule:
    - cron: '5 */2 * * *'
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger 2h loop snapshot at :05
        env:
          SYNC_SECRET: ${{ secrets.SYNC_SECRET }}
        run: |
          if [ -z "$SYNC_SECRET" ]; then
            echo "ERROR: SYNC_SECRET GitHub secret is not configured; loop snapshots will not run server-side."
            exit 1
          fi
          STATUS=$(curl -s -o /tmp/loops-cron.json -w "%{http_code}" \
            --max-time 180 \
            -H "x-sync-secret: ${SYNC_SECRET}" \
            "https://testedefi.vercel.app/api/loop-cron-snapshot")
          echo "Response status: $STATUS"
          cat /tmp/loops-cron.json || true
          if [ "$STATUS" != "200" ]; then
            echo "Warning: loop snapshot returned $STATUS"
            exit 1
          fi
